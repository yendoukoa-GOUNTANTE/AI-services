<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Domain</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="lucide.js"></script>
</head>
<body>
    <div class="popup-container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 10L50 50L80 10" stroke="url(#paint0_linear)" stroke-width="12" stroke-linecap="round"/>
                    <path d="M50 50V90" stroke="url(#paint0_linear)" stroke-width="12" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="8" fill="#8b5cf6"/>
                    <defs>
                        <linearGradient id="paint0_linear" x1="20" y1="10" x2="80" y2="90" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#2563eb"/>
                            <stop offset="1" stop-color="#8b5cf6"/>
                        </linearGradient>
                    </defs>
                </svg>
                <span>Codex Domain</span>
            </div>
        </header>

        <main>
            <div class="hero">
                <h1>Autonomous <span class="gradient-text">AI Ecosystem</span></h1>
            </div>

            <div class="links">
                <a href="http://localhost:5173" target="_blank" class="link-item">
                    <i data-lucide="layout"></i>
                    <span>Launch AI Store</span>
                    <i data-lucide="external-link" class="small-icon"></i>
                </a>
                <a href="http://localhost:5001" target="_blank" class="link-item">
                    <i data-lucide="server"></i>
                    <span>API Dashboard</span>
                    <i data-lucide="external-link" class="small-icon"></i>
                </a>
                <a href="https://github.com/GYFX35/AI-services" target="_blank" class="link-item">
                    <i data-lucide="github"></i>
                    <span>Source Code</span>
                    <i data-lucide="external-link" class="small-icon"></i>
                </a>
            </div>

            <div class="specialists">
                <h3>Core Specialists</h3>
                <div class="spec-list">
                    <div class="spec-item"><i data-lucide="globe"></i><span>Engineer</span></div>
                    <div class="spec-item"><i data-lucide="shield-check"></i><span>Debugger</span></div>
                    <div class="spec-item"><i data-lucide="mail"></i><span>Marketer</span></div>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 Yendoukoa AI</p>
        </footer>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
