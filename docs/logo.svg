<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  <!-- Main Y Shape -->
  <path d="M50 55 L50 85" stroke="url(#logo-gradient)" stroke-width="8" stroke-linecap="round"/>
  <path d="M50 55 L25 25" stroke="url(#logo-gradient)" stroke-width="8" stroke-linecap="round"/>
  <path d="M50 55 L75 25" stroke="url(#logo-gradient)" stroke-width="8" stroke-linecap="round"/>

  <!-- Neural Nodes -->
  <circle cx="50" cy="55" r="5" fill="url(#logo-gradient)"/>
  <circle cx="25" cy="25" r="6" fill="#2563eb"/>
  <circle cx="75" cy="25" r="6" fill="#8b5cf6"/>
  <circle cx="50" cy="85" r="6" fill="url(#logo-gradient)"/>

  <!-- AI Connectors / Circuits -->
  <path d="M25 25 L15 15" stroke="#2563eb" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M75 25 L85 15" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <circle cx="15" cy="15" r="2" fill="#2563eb" opacity="0.6"/>
  <circle cx="85" cy="15" r="2" fill="#8b5cf6" opacity="0.6"/>
</svg>
