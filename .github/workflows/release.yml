name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build wheel

      - name: Build Python Package
        run: python -m build

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: marketplace-frontend/package-lock.json

      - name: Install Node dependencies
        run: npm install
        working-directory: marketplace-frontend

      - name: Build frontend
        run: npm run build
        working-directory: marketplace-frontend

      - name: Create Release ZIP
        run: |
          zip -r ai-services-${{ github.ref_name }}-deployment.zip \
          app.py google_ai.py *_service.py \
          requirements.txt setup.py \
          docs/ \
          yendoukoa-ai-site/ \
          frontend/ \
          translations/ \
          Procfile Dockerfile docker-compose.yml \
          README.md CHANGELOG.md LICENSE PROJECT_ARTIFACTS.md AGENTS.md \
          .env.example

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*
            ai-services-${{ github.ref_name }}-deployment.zip
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
